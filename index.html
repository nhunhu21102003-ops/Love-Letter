<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo thiệp tình yêu</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Quicksand', sans-serif; background: #fce4ec; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #e91e63; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; color: #5d4037; font-weight: bold; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #f8bbd0; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #e91e63; }
        button { width: 100%; margin-top: 20px; padding: 14px; border: none; background: #e91e63; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        
        /* Khu vực kết quả */
        #result-area { margin-top: 25px; display: none; border-top: 2px dashed #f8bbd0; pt: 20px; text-align: center; }
        #qrcode { display: flex; justify-content: center; margin: 20px 0; }
        .link-box { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd; word-break: break-all; font-size: 0.8rem; margin-bottom: 10px; }
        .btn-copy { background: #4caf50; font-size: 0.8rem; padding: 8px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Thiết kế thiệp <3</h2>
    
    <label>Ngày bắt đầu yêu:</label>
    <input type="date" id="inputDate" value="2024-05-16">
    
    <label>Mật mã mở thư (ví dụ: ngày kỷ niệm):</label>
    <input type="text" id="inputPass" placeholder="Nhập mật mã...">
    
    <label>Lời nhắn gửi đối phương:</label>
    <textarea id="inputMsg" rows="3" placeholder="Viết gì đó thật ngọt ngào..."></textarea>
    
    <button onclick="generateEverything()">Tạo link & Mã QR</button>

    <div id="result-area">
        <p style="color: #e91e63; font-weight: bold;">Đã tạo xong thiệp của bạn!</p>
        
        <div id="qrcode"></div>
        
        <div class="link-box" id="finalLink"></div>
        <button class="btn-copy" onclick="copyLink()">Sao chép đường dẫn</button>
        <p style="font-size: 0.7rem; color: #888;">Gửi link hoặc ảnh QR này cho người ấy nhé!</p>
    </div>
</div>

<script>
    let generatedUrl = "";

    function generateEverything() {
        const date = document.getElementById('inputDate').value;
        const pass = document.getElementById('inputPass').value;
        const msg = encodeURIComponent(document.getElementById('inputMsg').value);
        
        if(!date || !pass || !msg) {
            alert("Vui lòng nhập đầy đủ thông tin nha!");
            return;
        }

        // Tạo URL (Giả sử bạn đặt tên file hiển thị là letter.html)
        // Lưu ý: Khi up lên web (GitHub/Vercel), thay 'letter.html' bằng link web của bạn
        const baseUrl = window.location.href.replace('index.html', '').split('?')[0];
        generatedUrl = `${baseUrl}letter.html?d=${date}&p=${pass}&m=${msg}`;

        // Hiển thị khu vực kết quả
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('finalLink').innerText = generatedUrl;

        // Xóa QR cũ nếu có và tạo QR mới
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: generatedUrl,
            width: 150,
            height: 150,
            colorDark : "#e91e63",
            colorLight : "#ffffff",
        });

        // Cuộn xuống để xem kết quả
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function copyLink() {
        navigator.clipboard.writeText(generatedUrl);
        alert("Đã sao chép link thành công!");
    }
</script>

</body>
</html>
